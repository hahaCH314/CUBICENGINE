<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CUBICENGINE Studio</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --panel: #16161a;
      --accent-gold: #fbbf24;
      --accent-teal: #22d3ee;
      --text: #e8eaed;
      --text-muted: #9aa0a6;
      --border: #2d2d34;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    /* 背景のグリッドパターン（マイクラ風） */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
      background-size: 32px 32px;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 40px;
      background: var(--panel);
      border: 3px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      width: 450px;
    }

    /* プレミアムなネオンライン */
    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent-gold), var(--accent-teal));
      border-radius: 24px 24px 0 0;
    }

    /* マイクラ風立体タイトル */
    .title {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--accent-gold);
      text-shadow: 3px 3px 0px #1e1208, 6px 6px 0px rgba(0,0,0,0.4);
      margin-bottom: 8px;
    }

    .title span {
      color: var(--accent-teal);
      text-shadow: 3px 3px 0px #0b2d3a, 6px 6px 0px rgba(0,0,0,0.4);
    }

    .subtitle {
      font-size: 11px;
      font-weight: 800;
      color: var(--text-muted);
      letter-spacing: 3px;
      margin-bottom: 40px;
      text-transform: uppercase;
    }

    /* ピクセルローダー */
    .loader {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
    }

    .pixel {
      width: 12px;
      height: 12px;
      background-color: var(--border);
      border-radius: 2px;
      animation: pulse 1.2s infinite ease-in-out;
    }

    .pixel:nth-child(1) { animation-delay: 0s; }
    .pixel:nth-child(2) { animation-delay: 0.15s; }
    .pixel:nth-child(3) { animation-delay: 0.3s; }
    .pixel:nth-child(4) { animation-delay: 0.45s; }
    .pixel:nth-child(5) { animation-delay: 0.6s; }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        background-color: var(--border);
      }
      50% {
        transform: scale(1.25);
        background-color: var(--accent-gold);
        box-shadow: 0 0 10px var(--accent-gold);
      }
    }

    /* 進捗テキスト */
    .status {
      font-size: 12px;
      color: var(--text-muted);
      height: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="container">
    <h1 class="title">CUBIC<span>ENGINE</span></h1>
    <p class="subtitle">Visual Studio</p>
    
    <div class="loader">
      <div class="pixel"></div>
      <div class="pixel"></div>
      <div class="pixel"></div>
      <div class="pixel"></div>
      <div class="pixel"></div>
    </div>
    
    <div class="status">サーバーを初期化中...</div>
  </div>
</body>
</html>
